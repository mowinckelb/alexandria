name: Smoke
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Health
        run: |
          body=$(curl -s https://mcp.mowinckel.ai/health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"' || { echo "::error::Health degraded"; exit 1; }
          echo "✓ health"

      - name: Protocol handshake
        run: |
          curl -sf https://mcp.mowinckel.ai/alexandria | grep -q '"protocol":"alexandria"' || { echo "::error::Handshake failed"; exit 1; }
          echo "✓ protocol"

      - name: Protocol file (write + read back)
        run: |
          curl -sf -X PUT https://mcp.mowinckel.ai/file/ci-smoke \
            -H "Authorization: Bearer ${{ secrets.ALEXANDRIA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"content":"# CI smoke\nverification.","text":"ci"}' | grep -q '"ok":true' || { echo "::error::File publish failed"; exit 1; }
          curl -sf https://mcp.mowinckel.ai/marketplace \
            -H "Authorization: Bearer ${{ secrets.ALEXANDRIA_API_KEY }}" | grep -q '"modules"' || { echo "::error::Marketplace read failed"; exit 1; }
          echo "✓ file + marketplace"

      - name: Protocol call
        run: |
          curl -sf -X POST https://mcp.mowinckel.ai/call \
            -H "Authorization: Bearer ${{ secrets.ALEXANDRIA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"modules":[{"id":"methodology","text":"ci smoke"}]}' | grep -q '"ok":true' || { echo "::error::Call failed"; exit 1; }
          echo "✓ call"

      - name: Company Library
        run: |
          curl -sf https://mcp.mowinckel.ai/library/authors | grep -q '"authors"' || { echo "::error::Library failed"; exit 1; }
          echo "✓ library"

      - name: Factory (GitHub raw URLs)
        run: |
          BASE="https://raw.githubusercontent.com/mowinckelb/Alexandria/main/factory"
          curl -sf "$BASE/setup.sh" | head -1 | grep -q "bash" || { echo "::error::setup.sh not accessible"; exit 1; }
          curl -sf "$BASE/canon/methodology.md" | head -1 | grep -q "#" || { echo "::error::methodology.md not accessible"; exit 1; }
          curl -sf "$BASE/hooks/shim.sh" | head -1 | grep -q "bash" || { echo "::error::shim.sh not accessible"; exit 1; }
          curl -sf "$BASE/hooks/payload.sh" | head -1 | grep -q "bash" || { echo "::error::payload.sh not accessible"; exit 1; }
          curl -sf "$BASE/skills/claudecode.md" | grep -q "Alexandria" || { echo "::error::claudecode.md not accessible"; exit 1; }
          echo "✓ factory (5 files verified)"

      - name: Website
        run: |
          status=$(curl -sL -o /dev/null -w '%{http_code}' https://mowinckel.ai)
          if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
            echo "::error::mowinckel.ai returned HTTP $status"
            exit 1
          fi
          www_status=$(curl -sL -o /dev/null -w '%{http_code}' https://www.mowinckel.ai)
          if [ "$www_status" -lt 200 ] || [ "$www_status" -ge 400 ]; then
            echo "::error::www.mowinckel.ai returned HTTP $www_status"
            exit 1
          fi
          echo "✓ website (root=$status, www=$www_status)"
