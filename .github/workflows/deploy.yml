name: Deploy
on:
  push:
    branches: [main]
    paths: ['server/src/**', 'server/wrangler.toml', 'server/package.json']
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install server deps
        run: cd server && npm ci

      - name: Type check
        run: cd server && npx tsc --noEmit

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # Full wrangler output reaches CI logs (was being filtered through
        # grep, which silently swallowed real errors and left only an
        # opaque "exit 1" — see 2026-05-06 verification-must-check-pipeline
        # incident).
        run: cd server && npx wrangler deploy

      - name: Verify health
        run: |
          sleep 5
          body=$(curl -sf https://api.alexandria-library.com/health)
          echo "$body"
          # Top-level status can be 'degraded' when the awareness digest flags
          # stale clients / deprecated hits — signal, not an infra failure.
          # Verify each infra component directly.
          for comp in kv d1 r2 env; do
            echo "$body" | grep -q "\"$comp\":\"ok\"" || { echo "::error::Component $comp not ok after deploy"; exit 1; }
          done
          echo "✓ health (all components)"

      # Smoke workflow auto-triggers after Deploy via workflow_run
