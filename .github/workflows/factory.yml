name: Factory Loop

# The Factory: Alexandria's autonomous self-improvement loop.
# Runs daily. Reads the dashboard + event log. Identifies what's not working.
# Makes code changes to tools.ts, modes.ts, soft defaults. Pushes to main.
# Railway auto-deploys. Every Author gets a better product. No human needed.

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Factory Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Fetch live data from the server
          DASHBOARD=$(curl -s https://alexandria-production-7db3.up.railway.app/analytics/dashboard || echo '{"status":"unreachable"}')
          EVENT_LOG=$(curl -s https://alexandria-production-7db3.up.railway.app/analytics/log | tail -200 || echo 'No events')

          # Run Claude Code with the Factory prompt
          claude -p "You are the CTO of Alexandria running the autonomous Factory loop.

          Your job: read the data, identify what's not working, and make code changes that improve the product for all users.

          DASHBOARD:
          $DASHBOARD

          RECENT EVENTS (last 200):
          $EVENT_LOG

          INSTRUCTIONS:
          1. Analyze the dashboard and event log. What patterns do you see?
          2. Read the current server code: server/src/tools.ts, server/src/modes.ts, server/src/analytics.ts
          3. Identify concrete improvements — soft defaults that should be adjusted, scaffolding that can be thinned, missing signal that should be captured.
          4. If there are meaningful improvements to make, edit the files and commit with a clear message prefixed with 'factory:'. Push to main.
          5. If the data is insufficient or everything looks healthy, do nothing. Not every run needs a change.
          6. NEVER change axioms (sovereignty, privacy, intent). Only adjust soft defaults and scaffolding.
          7. NEVER break the build. Run 'cd server && npm run build' before committing.
          8. Keep changes small and focused. One improvement per run, not ten.

          Be conservative. A Factory run that changes nothing is fine. A Factory run that breaks the product is not." \
            --allowedTools "Edit,Read,Write,Bash(npm run build:*),Bash(git *),Bash(curl *),Glob,Grep" \
            --dangerously-skip-permissions \
            --max-turns 20

      - name: Push if changes exist
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "Alexandria Factory"
            git config user.email "factory@mowinckel.ai"
            git add -A
            # Only commit if Claude didn't already commit
            git diff --cached --quiet || git commit -m "factory: autonomous improvement ($(date -u +%Y-%m-%d))"
            git push
          fi
