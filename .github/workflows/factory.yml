name: Factory Loop

# The Factory: Alexandria's autonomous self-improvement loop.
# Runs daily. The CTO reads data, reflects, researches, and improves
# the product. Philosophy is ground truth. Everything else is intelligence.
# The Factory IS the CTO doing its job without human prompting.

on:
  workflow_dispatch: # Manual trigger — reintroduce cron when event log has real data

permissions:
  contents: write

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Factory Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALEXANDRIA_SERVER_URL: ${{ vars.ALEXANDRIA_SERVER_URL || 'https://alexandria-mcp.fly.dev' }}
        run: |
          # Fetch live data from the server
          DASHBOARD=$(curl -s ${ALEXANDRIA_SERVER_URL}/analytics/dashboard || echo '{"status":"unreachable"}')
          EVENT_LOG=$(curl -s ${ALEXANDRIA_SERVER_URL}/analytics/log | tail -200 || echo 'No events')

          # Run Claude Code as the CTO
          claude -p "You are the CTO of Alexandria running the daily autonomous Factory loop.

          READ FIRST:
          - CLAUDE.md (your role, the architecture, the philosophy)
          - docs/Blueprint.md (the philosophical framework)
          - server/src/tools.ts, server/src/modes.ts (current soft defaults)
          - server/factory-learnings.md (your accumulated learnings from prior runs)

          LIVE DATA:
          Dashboard: $DASHBOARD
          Recent events (last 200): $EVENT_LOG

          YOUR JOB — in this order:

          1. REFLECT. Read your prior learnings. What did you try last time? What worked? What didn't? What questions are still open? If this is your first run, note that.

          2. VERIFY. Run the e2e test (cd server && ANTHROPIC_API_KEY=\$ANTHROPIC_API_KEY npx tsx test/e2e.ts). Does the product work? If tests fail, diagnose and fix before anything else.

          3. ANALYZE. Read the dashboard and event log. What patterns do you see? Are events accumulating? Is the Machine loop producing data? Are there high correction rates? Unused tools? System observations in the feedback?

          4. RESEARCH. What is the biggest open problem right now? Search the web for solutions. Check if there are new MCP capabilities, Claude behavior changes, or approaches other products use that could help. Think about what would make the biggest difference.

          5. IMPROVE. If you found things worth changing — soft defaults to adjust, scaffolding to thin, missing verification signals, research findings to implement — make the changes. Build and test before committing.

          6. LEARN. Update server/factory-learnings.md with what you learned this run. What you tried, what the data showed, what you want to investigate next time. This file compounds across runs — it is your persistent memory as the Factory CTO.

          7. COMMIT. If you made changes, commit with message prefixed 'factory:' and push to main.

          CONSTRAINTS:
          - NEVER change axioms (sovereignty, privacy, intent to develop z).
          - NEVER break the build. Run 'cd server && npm run build' before committing.
          - NEVER chase metrics. Metrics are verification, not goals. The philosophy is the objective.
          - You are the CTO. Think from first principles. The philosophy is your ground truth. Everything else is your judgment." \
            --allowedTools "Edit,Read,Write,Bash(*),Glob,Grep,WebSearch,WebFetch" \
            --dangerously-skip-permissions \
            --max-turns 30

      - name: Push if changes exist
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "Alexandria Factory"
            git config user.email "factory@mowinckel.ai"
            git add -A
            # Only commit if Claude didn't already commit
            git diff --cached --quiet || git commit -m "factory: autonomous improvement ($(date -u +%Y-%m-%d))"
            git push
          fi
