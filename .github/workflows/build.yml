name: Build
on:
  push:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'app/**'
      - 'package.json'
      - 'server/package.json'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Protocol R2 key gate (only file-access.ts may read protocol/* bytes)
        run: |
          OFFENDERS=$(grep -lE 'protocol/\$\{' server/src/*.ts 2>/dev/null \
            | grep -vE 'server/src/(file-access|protocol)\.ts$' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::protocol_files R2 keys built outside the allowed paths:"
            echo "$OFFENDERS"
            echo "Route the access through readProtocolFile() in server/src/file-access.ts."
            exit 1
          fi

      - name: Server type check
        run: cd server && npm ci && npx tsc --noEmit

      - name: App build
        run: npm ci && npm run build
