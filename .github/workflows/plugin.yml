name: Plugin
on:
  push:
    branches: [main]
    paths:
      - 'factory/plugin/**'
      - '.claude-plugin/**'
      - 'factory/hooks/shim.sh'
      # Signing surface — the signing job below must run on any commit that
      # touches a signed file, the manifest, or the signer roots, or a
      # "committed but never re-signed" drift ships without CI ever looking.
      - 'factory/manifest.txt'
      - 'factory/manifest.txt.sig'
      - 'factory/setup.sh'
      - 'factory/ship.sh'
      - 'factory/canon/**'
      - 'factory/hooks/payload.sh'
      - 'factory/skills/**'
      - 'factory/scripts/**'
      - 'factory/systems/**'
      - 'factory/migrate.sh'
  pull_request:
    branches: [main]
    paths:
      - 'factory/plugin/**'
      - '.claude-plugin/**'
      - 'factory/hooks/shim.sh'
      - 'factory/manifest.txt'
      - 'factory/manifest.txt.sig'
      - 'factory/setup.sh'
      - 'factory/ship.sh'
      - 'factory/canon/**'
      - 'factory/hooks/payload.sh'
      - 'factory/skills/**'
      - 'factory/scripts/**'
      - 'factory/systems/**'
      - 'factory/migrate.sh'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Manifests are valid JSON
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool factory/plugin/.claude-plugin/plugin.json > /dev/null
          python3 -m json.tool factory/plugin/hooks/hooks.json > /dev/null

      - name: Shell syntax
        run: |
          bash -n factory/plugin/scripts/plugin-shim.sh
          bash -n factory/plugin/scripts/shim.sh
          bash -n factory/hooks/shim.sh

      - name: Bundled shim is byte-identical to canonical shim
        run: cmp factory/hooks/shim.sh factory/plugin/scripts/shim.sh

      - name: Hook handoff — all three modes reach the shim
        run: |
          export FAKE=$RUNNER_TEMP/fake
          mkdir -p $FAKE/home/alexandria/files $FAKE/home/alexandria/system/hooks
          printf '#!/usr/bin/env bash\necho "SHIM $1" >> %s/fired.txt\n' "$FAKE" > $FAKE/home/alexandria/system/hooks/shim.sh
          export HOME=$FAKE/home CLAUDE_PLUGIN_ROOT=$PWD/factory/plugin
          bash factory/plugin/scripts/plugin-shim.sh session-start
          bash factory/plugin/scripts/plugin-shim.sh session-end
          bash factory/plugin/scripts/plugin-shim.sh subagent
          grep -q "SHIM session-start" $FAKE/fired.txt
          grep -q "SHIM session-end" $FAKE/fired.txt
          grep -q "SHIM subagent" $FAKE/fired.txt

      - name: Legacy-defer — plugin exits silently when settings hooks exist
        run: |
          export FAKE2=$RUNNER_TEMP/fake2
          mkdir -p $FAKE2/home/.claude $FAKE2/home/alexandria/files $FAKE2/home/alexandria/system/hooks
          echo '{"hooks":{"SessionStart":[{"hooks":[{"type":"command","command":"bash $HOME/alexandria/system/hooks/shim.sh session-start"}]}]}}' > $FAKE2/home/.claude/settings.json
          printf '#!/usr/bin/env bash\necho SHOULD_NOT_RUN >> %s/fired.txt\n' "$FAKE2" > $FAKE2/home/alexandria/system/hooks/shim.sh
          export HOME=$FAKE2/home CLAUDE_PLUGIN_ROOT=$PWD/factory/plugin
          bash factory/plugin/scripts/plugin-shim.sh session-start
          test ! -f $FAKE2/fired.txt

      - name: No-canon degradation — one-line message, exit 0
        run: |
          export FAKE3=$RUNNER_TEMP/fake3
          mkdir -p $FAKE3/home $FAKE3/empty
          cd $FAKE3/empty
          export HOME=$FAKE3/home CLAUDE_PLUGIN_ROOT=$GITHUB_WORKSPACE/factory/plugin
          OUT=$(bash $GITHUB_WORKSPACE/factory/plugin/scripts/plugin-shim.sh session-start)
          echo "$OUT" | grep -q "no alexandria folder is visible here"

  # Signing integrity — makes "committed but never re-signed" impossible to
  # ship green. Three gates:
  #   (a) manifest.txt.sig verifies against the exact public key setup.sh
  #       installs as the trust root (extracted from setup.sh itself, so CI
  #       checks the same key users get — no second copy to drift),
  #   (b) every path listed in manifest.txt re-hashes to its pinned sha256,
  #   (c) every path in ship.sh's SIGNED_FILES appears in manifest.txt.
  #
  # NOTE (2026-07-09): gate (c) FAILS on current HEAD by design — the plugin
  # files (factory/plugin/*) are in SIGNED_FILES but were committed without a
  # re-sign, so they are missing from manifest.txt. Red here means exactly
  # that drift; it goes green the moment the maintainer re-signs
  # (bash factory/ship.sh). Intended — do not weaken this job to pass.
  signing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Manifest signature verifies against the setup.sh trust root
        run: |
          # Extract the allowed_signers block exactly as setup.sh writes it
          # to ~/alexandria/system/allowed_signers (the <<'EOF' heredoc).
          awk '/^cat > .*allowed_signers/{f=1;next} f&&/^EOF$/{exit} f' factory/setup.sh > "$RUNNER_TEMP/allowed_signers"
          test -s "$RUNNER_TEMP/allowed_signers" || { echo "could not extract allowed_signers from factory/setup.sh"; exit 1; }
          ssh-keygen -Y verify \
            -f "$RUNNER_TEMP/allowed_signers" \
            -I alexandria-payload-signing \
            -n alexandria \
            -s factory/manifest.txt.sig < factory/manifest.txt

      - name: Every manifest entry re-hashes to its pinned sha256
        run: sha256sum --strict -c factory/manifest.txt

      - name: Every SIGNED_FILES entry is present in the manifest
        run: |
          sed -n '/^SIGNED_FILES=(/,/^)/p' factory/ship.sh \
            | sed '1d;$d;s/#.*//;s/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' > "$RUNNER_TEMP/signed_files.txt"
          test -s "$RUNNER_TEMP/signed_files.txt" || { echo "could not extract SIGNED_FILES from factory/ship.sh"; exit 1; }
          awk '{print $2}' factory/manifest.txt > "$RUNNER_TEMP/manifest_paths.txt"
          missing=0
          while IFS= read -r f; do
            grep -qxF "$f" "$RUNNER_TEMP/manifest_paths.txt" || {
              echo "NOT IN MANIFEST: $f — listed in ship.sh SIGNED_FILES but never signed. Run 'bash factory/ship.sh' to re-sign."
              missing=1
            }
          done < "$RUNNER_TEMP/signed_files.txt"
          exit $missing
