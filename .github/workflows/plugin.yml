name: Plugin
on:
  push:
    branches: [main]
    paths:
      - 'factory/plugin/**'
      - '.claude-plugin/**'
      - 'factory/hooks/shim.sh'
  pull_request:
    branches: [main]
    paths:
      - 'factory/plugin/**'
      - '.claude-plugin/**'
      - 'factory/hooks/shim.sh'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Manifests are valid JSON
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool factory/plugin/.claude-plugin/plugin.json > /dev/null
          python3 -m json.tool factory/plugin/hooks/hooks.json > /dev/null

      - name: Shell syntax
        run: |
          bash -n factory/plugin/scripts/plugin-shim.sh
          bash -n factory/plugin/scripts/shim.sh
          bash -n factory/hooks/shim.sh

      - name: Bundled shim is byte-identical to canonical shim
        run: cmp factory/hooks/shim.sh factory/plugin/scripts/shim.sh

      - name: Hook handoff — all three modes reach the shim
        run: |
          export FAKE=$RUNNER_TEMP/fake
          mkdir -p $FAKE/home/alexandria/files $FAKE/home/alexandria/system/hooks
          printf '#!/usr/bin/env bash\necho "SHIM $1" >> %s/fired.txt\n' "$FAKE" > $FAKE/home/alexandria/system/hooks/shim.sh
          export HOME=$FAKE/home CLAUDE_PLUGIN_ROOT=$PWD/factory/plugin
          bash factory/plugin/scripts/plugin-shim.sh session-start
          bash factory/plugin/scripts/plugin-shim.sh session-end
          bash factory/plugin/scripts/plugin-shim.sh subagent
          grep -q "SHIM session-start" $FAKE/fired.txt
          grep -q "SHIM session-end" $FAKE/fired.txt
          grep -q "SHIM subagent" $FAKE/fired.txt

      - name: Legacy-defer — plugin exits silently when settings hooks exist
        run: |
          export FAKE2=$RUNNER_TEMP/fake2
          mkdir -p $FAKE2/home/.claude $FAKE2/home/alexandria/files $FAKE2/home/alexandria/system/hooks
          echo '{"hooks":{"SessionStart":[{"hooks":[{"type":"command","command":"bash $HOME/alexandria/system/hooks/shim.sh session-start"}]}]}}' > $FAKE2/home/.claude/settings.json
          printf '#!/usr/bin/env bash\necho SHOULD_NOT_RUN >> %s/fired.txt\n' "$FAKE2" > $FAKE2/home/alexandria/system/hooks/shim.sh
          export HOME=$FAKE2/home CLAUDE_PLUGIN_ROOT=$PWD/factory/plugin
          bash factory/plugin/scripts/plugin-shim.sh session-start
          test ! -f $FAKE2/fired.txt

      - name: No-canon degradation — one-line message, exit 0
        run: |
          export FAKE3=$RUNNER_TEMP/fake3
          mkdir -p $FAKE3/home $FAKE3/empty
          cd $FAKE3/empty
          export HOME=$FAKE3/home CLAUDE_PLUGIN_ROOT=$GITHUB_WORKSPACE/factory/plugin
          OUT=$(bash $GITHUB_WORKSPACE/factory/plugin/scripts/plugin-shim.sh session-start)
          echo "$OUT" | grep -q "no alexandria folder exists yet"
