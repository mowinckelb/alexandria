name: Stranger
on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
  push:
    branches: [main]
    paths: ['server/test/**']
  workflow_dispatch: {}

jobs:
  stranger:
    # Run after Deploy succeeds, on test file changes, or manual trigger
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Stranger test
        shell: bash
        env:
          ALEXANDRIA_TEST_KEY: ${{ secrets.ALEXANDRIA_TEST_KEY }}
        run: bash server/test/stranger.sh
