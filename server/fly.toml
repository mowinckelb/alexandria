# Alexandria MCP Server — Fly.io configuration
# Deploy: fly deploy --config server/fly.toml
# Create volume first: fly volumes create alexandria_data --size 1 --region ams

app = "alexandria-mcp"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  DATA_DIR = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "alexandria_data"
  destination = "/data"
