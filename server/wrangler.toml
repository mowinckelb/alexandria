name = "alexandria-server"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV namespace — single namespace with key prefixes
[[kv_namespaces]]
binding = "DATA"
id = "7f1153cbddfd49239a51f07d98cee37a"

# D1 database — Library metadata, access log, billing tab
[[d1_databases]]
binding = "DB"
database_name = "alexandria-library"
database_id = "d76e2219-dbcc-43da-b618-1b0ae0095db8"

# R2 bucket — published artifacts (shadows, pulses, quizzes, works)
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "alexandria-artifacts"

# Route-based binding — intercepts when DNS record is proxied
[[routes]]
pattern = "mcp.mowinckel.ai/*"
zone_id = "7a1952631048380db0df21b5daa1e88e"

# Cron trigger — daily follow-up email check at 9am UTC
[triggers]
crons = ["0 9 * * *", "0 2 1 * *"]

# Import .md files as text modules (source of truth for Axioms + Blueprint)
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = false

[vars]
BETA_MODE = "true"
SERVER_URL = "https://mcp.mowinckel.ai"
FOUNDER_EMAIL = "benjamin@mowinckel.com"
ADMIN_GITHUB_LOGIN = "mowinckelb"
WEBSITE_URL = "https://mowinckel.ai"
LIBRARY_CUT_PERCENT = "50"
KIN_THRESHOLD = "5"
BLUEPRINT_PUBLIC_KEY = "302a300506032b65700321003f677900d85db399ce245bb4c3e40dcf6aace66fdcf04203735fa817cda7bd9b"
