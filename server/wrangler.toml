name = "alexandria-server"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# KV namespace — single namespace with key prefixes
[[kv_namespaces]]
binding = "DATA"
id = "7f1153cbddfd49239a51f07d98cee37a"

# D1 database — Library metadata, access log, billing tab
[[d1_databases]]
binding = "DB"
database_name = "alexandria-library"
database_id = "d76e2219-dbcc-43da-b618-1b0ae0095db8"

# R2 bucket — published artifacts (shadows, pulses, quizzes, works)
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "alexandria-artifacts"

# Route-based bindings — intercept when DNS records are proxied.
# api.alexandria-library.com is the canonical hostname. api.mowinckel.ai
# stays bound to the same Worker so legacy CLI/skill installs that cached
# the old URL keep working until they refresh from github. mcp.mowinckel.ai
# is the original alias from before the api.* migration — retire when its
# traffic is clean.
[[routes]]
pattern = "api.mowinckel.ai"
custom_domain = true

[[routes]]
pattern = "api.alexandria-library.com"
custom_domain = true

[[routes]]
pattern = "mcp.mowinckel.ai/*"
zone_id = "7a1952631048380db0df21b5daa1e88e"

# Cron triggers — UTC. Daily digest at 15:00 UTC = 8am PDT (7am PST in winter,
# Cloudflare cron has no IANA zone support). Monthly settlement 1st @ 02:00 UTC.
# Audit mirror every 10 min — minimises the window during which a tampered
# event could be invisible (dispatch by event.cron in worker.ts).
[triggers]
crons = ["0 15 * * *", "0 2 1 * *", "*/10 * * * *"]

# Import .md files as text modules (source of truth for canon modules)
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = false

[vars]
BETA_MODE = "false"
SERVER_URL = "https://api.alexandria-library.com"
FOUNDER_EMAIL = "benmowinckel@gmail.com"
ADMIN_GITHUB_LOGIN = "mowinckelb"
WEBSITE_URL = "https://alexandria-library.com"
LIBRARY_CUT_PERCENT = "50"
KIN_THRESHOLD = "3"

# PLM "ask this mind" twin inference — two variants (plm.md § both-twin arch):
#   • weights twin (privacy floor, default PUBLIC): a LoRA compiled from the
#     Author's substrate. DEFAULT_TWIN_CHECKPOINT + DEFAULT_TWIN_BASE.
#   • context twin (fidelity ceiling, default AUTHORS): a frontier model reading
#     the substrate in context — exposes it, so gated. DEFAULT_TWIN_CONTEXT_MODEL.
# The Worker relays questions to a sidecar that fronts the model(s) and holds the
# keys/substrate (never the Worker). Empty TWIN_INFERENCE_URL ⇒ "twin offline"
# (zero-regret: the surface ships, the engine slots in later). To go live: set
# TWIN_INFERENCE_URL to the sidecar, `wrangler secret put TWIN_INFERENCE_SECRET`,
# and set the per-variant defaults here or per-author via POST /library/{id}/twin.
# Checkpoint/model handles are not secrets; the Tinker/model API keys are.
TWIN_INFERENCE_URL = ""
DEFAULT_TWIN_BASE = "Qwen/Qwen3.6-35B-A3B"
DEFAULT_TWIN_CHECKPOINT = ""
# Sensible default so enabling a context twin doesn't silently no-op when the
# Author didn't name a model. The sidecar uses its own TWIN_FRONTIER_MODEL for
# actual inference; this just satisfies the "has a resolvable model" gate + is
# the display value. Any Author can still override per-twin.
DEFAULT_TWIN_CONTEXT_MODEL = "claude-sonnet-4-6"
