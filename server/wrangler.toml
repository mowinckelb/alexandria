name = "alexandria-server"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV namespace — single namespace with key prefixes
[[kv_namespaces]]
binding = "DATA"
id = "7f1153cbddfd49239a51f07d98cee37a"

# D1 database — Library metadata, access log, billing tab
[[d1_databases]]
binding = "DB"
database_name = "alexandria-library"
database_id = "d76e2219-dbcc-43da-b618-1b0ae0095db8"

# R2 bucket — published artifacts (shadows, pulses, quizzes, works)
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "alexandria-artifacts"

# Route-based bindings — intercept when DNS records are proxied.
# api.mowinckel.ai is the canonical hostname; mcp.mowinckel.ai is kept
# during soak so existing installs (Author shims that cached the old
# URL in .hooks_payload) keep working until they refresh from github.
# Retire mcp.mowinckel.ai after 24-48h of clean api.mowinckel.ai traffic.
[[routes]]
pattern = "api.mowinckel.ai"
custom_domain = true

[[routes]]
pattern = "mcp.mowinckel.ai/*"
zone_id = "7a1952631048380db0df21b5daa1e88e"

# Cron triggers — UTC. Daily digest at 15:00 UTC = 8am PDT (7am PST in winter,
# Cloudflare cron has no IANA zone support). Monthly settlement 1st @ 02:00 UTC.
[triggers]
crons = ["0 15 * * *", "0 2 1 * *"]

# Import .md files as text modules (source of truth for canon modules)
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = false

[vars]
BETA_MODE = "false"
SERVER_URL = "https://api.mowinckel.ai"
FOUNDER_EMAIL = "benjamin@mowinckel.com"
ADMIN_GITHUB_LOGIN = "mowinckelb"
WEBSITE_URL = "https://mowinckel.ai"
LIBRARY_CUT_PERCENT = "50"
KIN_THRESHOLD = "5"
